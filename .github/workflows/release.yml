name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.vsce-target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            vsce-target: linux-x64
          - os: macos-13
            rust-target: x86_64-apple-darwin
            vsce-target: darwin-x64
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            vsce-target: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-${{ matrix.rust-target }}-cargo-${{ hashFiles('server/Cargo.lock') }}

      - name: Test server
        if: matrix.vsce-target == 'linux-x64'
        run: cargo test --manifest-path server/Cargo.toml --release

      - name: Build server (release)
        run: cargo build --release --manifest-path server/Cargo.toml --target ${{ matrix.rust-target }}

      - name: Stage server binary
        run: |
          mkdir -p server/bin
          cp server/target/${{ matrix.rust-target }}/release/urdf-lsp server/bin/urdf-lsp
          chmod +x server/bin/urdf-lsp

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Build client
        run: npm run build:client

      - name: Package extension
        run: |
          npm install -g @vscode/vsce
          vsce package --no-dependencies --target ${{ matrix.vsce-target }} --out urdf-${{ matrix.vsce-target }}.vsix

      - name: Upload .vsix
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vsce-target }}
          path: urdf-${{ matrix.vsce-target }}.vsix
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download .vsix artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          fail_on_unmatched_files: true
          generate_release_notes: true
